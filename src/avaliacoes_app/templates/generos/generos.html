{% extends 'base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-4 mb-4">
        <div class="card shadow-sm border-0">
            <div class="card-header text-white p-3 border-0" style="background-color: var(--primary-color);">
                <h5 class="mb-0 fw-bold" style="color: black;">Novo Gênero</h5>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('generos.criar_genero') }}">
                    <div class="mb-3">
                        <label class="form-label small fw-bold">NOME DO GÊNERO</label>
                        <input type="text" class="form-control border-0 bg-light" name="nome" placeholder="Ex: Sci-Fi, Drama..." required>
                    </div>
                    <button type="submit" class="btn btn-success w-100 fw-bold">Adicionar</button>
                </form>
            </div>
        </div>
    </div>

    <div class="col-md-8">
        <h3 class="fw-800 mb-4" style="color: var(--primary-color);">Gêneros Disponíveis</h3>
        <div class="row">
            {% for genero in generos %}
            <div class="col-sm-6 mb-3">
                <div class="bg-dark p-3 rounded-4 shadow-sm d-flex justify-content-between align-items-center">
                    <span class="fw-bold" style="color: var(--primary-color);">{{ genero.nome }}</span>
                    <div class="d-flex gap-2">
                        <button class="btn btn-sm btn-outline-light border-0" data-bs-toggle="modal" data-bs-target="#editGen{{ genero.id_genero }}">
                            <i class="bi bi-pencil"></i>
                        </button>
                        <form method="POST" action="{{ url_for('generos.deletar_genero', id_genero=genero.id_genero) }}" class="m-0" onsubmit="return confirm('Excluir este gênero?');">
                            <button type="submit" class="btn btn-sm btn-outline-danger border-0"><i class="bi bi-trash"></i></button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="modal fade" id="editGen{{ genero.id_genero }}" tabindex="-1" aria-hidden="true">
                <div class="modal-dialog modal-dialog-centered">
                    <form method="POST" action="{{ url_for('generos.atualizar_genero', id_genero=genero.id_genero) }}" class="modal-content border-0 shadow">
                        <div class="modal-header border-0 p-4">
                            <h5 class="fw-bold mb-0 text-dark">Editar: {{ genero.nome }}</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body px-4 pb-4">
                            <input type="text" class="form-control border-0 bg-light py-2" name="nome" value="{{ genero.nome }}" required>
                        </div>
                        <div class="modal-footer border-0 px-4 pb-4">
                            <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary px-4">Salvar Alterações</button>
                        </div>
                    </form>
                </div>
            </div>
            {% else %}
            <div class="col-12 text-center py-5 text-white-50">
                <p>Nenhum gênero cadastrado ainda.</p>
            </div>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}
