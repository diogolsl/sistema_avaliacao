{% extends 'base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-4 mb-4">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">Novo Usuário</h5>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('usuarios_bp.criar_usuario') }}">
                    <div class="mb-3">
                        <label class="form-label">Nome Completo</label>
                        <input type="text" class="form-control" name="nome" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">E-mail</label>
                        <input type="email" class="form-control" name="email" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Cadastrar Usuário</button>
                </form>
            </div>
        </div>
    </div>

    <div class="col-md-8">
        <h3 class="mb-3">Usuários Cadastrados</h3>
        <div class="table-responsive bg-white shadow-sm rounded">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>E-mail</th>
                        <th class="text-end">Ações</th>
                    </tr>
                </thead>
                <tbody>
                    {% for usuario in usuarios %}
                    <tr>
                        <td>{{ usuario.id_usuario }}</td>
                        <td>{{ usuario.nome }}</td>
                        <td>{{ usuario.email }}</td>
                        <td class="text-end">
                            <div class="d-inline-flex gap-1">
                                <button class="btn btn-sm btn-info text-white" data-bs-toggle="modal" data-bs-target="#editUser{{ usuario.id_usuario }}">Editar</button>
                                <form method="POST" action="{{ url_for('usuarios_bp.deletar_usuario', id_usuario=usuario.id_usuario) }}" onsubmit="return confirm('Excluir este usuário apagará todas as suas avaliações. Confirmar?');">
                                    <button type="submit" class="btn btn-sm btn-danger">Excluir</button>
                                </form>
                            </div>
                        </td>
                    </tr>

                    <div class="modal fade" id="editUser{{ usuario.id_usuario }}" tabindex="-1">
                        <div class="modal-dialog">
                            <form method="POST" action="{{ url_for('usuarios_bp.atualizar_usuario', id_usuario=usuario.id_usuario) }}" class="modal-content">
                                <div class="modal-header bg-info text-white">
                                    <h5 class="modal-title">Editar Usuário</h5>
                                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                </div>
                                <div class="modal-body">
                                    <div class="mb-3">
                                        <label class="form-label">Nome</label>
                                        <input type="text" class="form-control" name="nome" value="{{ usuario.nome }}" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">E-mail</label>
                                        <input type="email" class="form-control" name="email" value="{{ usuario.email }}" required>
                                    </div>
                                </div>
                                <div class="modal-footer">
                                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                                    <button type="submit" class="btn btn-primary">Salvar</button>
                                </div>
                            </form>
                        </div>
                    </div>
                    {% else %}
                    <tr><td colspan="4" class="text-center text-muted py-3">Nenhum usuário cadastrado.</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
